<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    header svg  { width: 24px; height: 24px; color: #3b82f6; flex-shrink: 0; }
    header span { font-weight: 600; font-size: 0.9rem; color: #475569; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      background: #eff6ff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: #3b82f6;
    }

    .icon-wrap svg { width: 30px; height: 30px; }

    h1    { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .desc { color: #64748b; font-size: 0.875rem; line-height: 1.6; margin-bottom: 2rem; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
    }

    .pill::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
    }

    footer {
      text-align: center;
      padding: 1.25rem;
      color: #94a3b8;
      font-size: 0.7rem;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>

<header>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <path d="M8 21h8M12 17v4"/>
  </svg>
  <span>Enterprise Hub — App Spoke</span>
</header>

<main>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <h1>{{ title }}</h1>
    <p class="desc">{{ description }}</p>
    <span class="pill">Running in App Spoke &middot; VNet Integrated</span>
  </div>
</main>

<footer>
  Azure App Service &nbsp;&middot;&nbsp; VNet Integration via snet-webapps (10.1.4.0/24) &nbsp;&middot;&nbsp; Hub-and-Spoke Architecture
</footer>

</body>
</html>
